name: Release

on:
  push:
    tags: ['v*']

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun run lint
      - name: Publish
        run: |
          name=$(jq -r .name dist/package.json)
          version=$(jq -r .version dist/package.json)
          if npm view "$name@$version" version 2>/dev/null; then
            echo "⏭️  $name@$version already published, skipping"
          else
            npm publish dist/ --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
